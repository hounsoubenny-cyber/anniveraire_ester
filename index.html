<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🎂 Joyeux Anniversaire Ester !</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --pink:#ff6b6b;
  --pink-light:rgba(255,107,107,0.12);
  --pink-glow:rgba(255,107,107,0.35);
  --bg1:#fdfcfb;
  --bg2:#ecddd0;
  --card:rgba(255,255,255,0.88);
  --text:#2a2a2a;
  --muted:#888;
  --border:rgba(255,107,107,0.18);
  --shadow:0 24px 70px rgba(0,0,0,0.12);
  --radius:24px;
  --transition:0.55s cubic-bezier(.4,0,.2,1);
}

body{
  font-family:'Segoe UI',system-ui,sans-serif;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:linear-gradient(140deg,var(--bg1) 0%,var(--bg2) 100%);
  padding:20px;
  overflow-x:hidden;
  position:relative;
  transition:background var(--transition),color var(--transition);
  color:var(--text);
}

/* ===== DARK ===== */
body.dark{
  --bg1:#0f0f1e;--bg2:#1a1a35;
  --card:rgba(18,18,38,0.92);
  --text:#e8e8f0;--muted:#8888aa;
  --border:rgba(255,107,107,0.22);
  --shadow:0 24px 70px rgba(0,0,0,0.55);
}

/* ===== CONTROLS ===== */
.controls{
  position:fixed;top:18px;right:18px;z-index:200;
  display:flex;flex-direction:column;align-items:flex-end;gap:8px;
}
.ctrl-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end;}

.controls select,.ctrl-btn{
  padding:7px 15px;
  border:1.5px solid var(--pink);
  border-radius:40px;
  background:var(--card);
  backdrop-filter:blur(12px);
  font-size:12.5px;font-weight:600;
  color:var(--text);cursor:pointer;outline:none;
  transition:all .25s;
  box-shadow:0 3px 12px var(--pink-glow);
}
.controls select{max-width:210px;}
.ctrl-btn{white-space:nowrap;}
.controls select:hover,.ctrl-btn:hover{
  transform:translateY(-1px);
  box-shadow:0 6px 20px var(--pink-glow);
}

/* ===== CARD ===== */
.card{
  max-width:820px;width:100%;
  background:var(--card);
  backdrop-filter:blur(22px);
  border-radius:var(--radius);
  border:1px solid var(--border);
  padding:44px 48px 36px;
  box-shadow:var(--shadow);
  position:relative;z-index:10;
  display:flex;flex-direction:column;
  min-height:520px;
  transition:background var(--transition),box-shadow var(--transition);
}

/* ===== SLIDE WRAPPER ===== */
.slides-wrap{flex:1;position:relative;overflow:hidden;}

.slide{
  display:none;
  position:absolute;inset:0;
  padding:8px 0;
  overflow-y:auto;
}
.slide.active{display:block;}

/* ===== SLIDE CONTENT ===== */
.slide-content{
  font-size:16.5px;line-height:1.85;
  color:var(--text);
  white-space:pre-wrap;word-wrap:break-word;
  min-height:180px;
}

/* ===== CURSOR ===== */
.cursor{
  display:inline-block;width:2px;height:1.1em;
  background:var(--pink);margin-left:2px;
  animation:blink .65s step-end infinite;
  vertical-align:text-bottom;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ===== NAV ===== */
.nav{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:22px;gap:12px;flex-wrap:wrap;
}
.nav-btn{
  padding:10px 26px;
  border:none;border-radius:40px;
  font-size:15px;font-weight:700;
  cursor:pointer;
  background:var(--pink);color:#fff;
  box-shadow:0 4px 16px var(--pink-glow);
  transition:all .25s;
}
.nav-btn:hover:not(:disabled){transform:scale(1.04);box-shadow:0 6px 24px var(--pink-glow);}
.nav-btn:disabled{opacity:.38;cursor:not-allowed;transform:none;}
.page-info{font-size:14px;font-weight:600;color:var(--muted);}

/* ===== GIFT 3D ===== */
.gift-area{margin-top:22px;text-align:center;}

/* scène 3D */
.gift-scene{
  display:inline-block;
  perspective:600px;
  margin-bottom:12px;
  cursor:pointer;
  user-select:none;
}

/* boîte entière */
.gift-box{
  width:90px;height:90px;
  position:relative;
  transform-style:preserve-3d;
  transition:transform .5s cubic-bezier(.4,0,.2,1);
}
.gift-scene:hover .gift-box{transform:rotateY(8deg) rotateX(-6deg);}

/* couvercle */
.gift-lid{
  position:absolute;top:0;left:0;right:0;
  height:26px;
  transform-origin:bottom center;
  transform-style:preserve-3d;
  transition:transform .7s cubic-bezier(.4,0,.2,1);
  z-index:2;
}
.gift-lid-top{
  position:absolute;inset:0;
  background:linear-gradient(135deg,#f5576c,#f093fb);
  border-radius:8px 8px 0 0;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;
  box-shadow:0 -2px 10px rgba(245,87,108,.35);
}
/* ruban vertical sur couvercle */
.gift-lid-top::after{
  content:'';position:absolute;left:50%;top:0;bottom:0;
  width:12px;transform:translateX(-50%);
  background:rgba(255,255,255,.35);border-radius:2px;
}

/* corps de la boîte */
.gift-body{
  position:absolute;bottom:0;left:0;right:0;
  height:68px;
  background:linear-gradient(160deg,#f5576c,#c0392b);
  border-radius:0 0 10px 10px;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
/* ruban horizontal */
.gift-body::before{
  content:'';position:absolute;left:0;right:0;
  top:50%;transform:translateY(-50%);
  height:12px;background:rgba(255,255,255,.3);
}
/* ruban vertical */
.gift-body::after{
  content:'';position:absolute;top:0;bottom:0;
  left:50%;transform:translateX(-50%);
  width:12px;background:rgba(255,255,255,.3);
}

/* nœud */
.gift-knot{
  position:absolute;top:-8px;left:50%;
  transform:translateX(-50%);
  font-size:20px;z-index:3;
  transition:transform .5s,opacity .4s;
}

/* état ouvert */
.gift-scene.opened .gift-lid{transform:rotateX(-130deg) translateZ(4px);}
.gift-scene.opened .gift-knot{opacity:0;transform:translateX(-50%) scale(0);}

/* message qui sort */
.gift-msg{
  display:none;opacity:0;
  transform:translateY(20px) scale(.9);
  transition:opacity .5s .3s,transform .5s .3s;
  font-size:18px;font-weight:700;color:var(--pink);
  padding:10px 0 4px;
  text-shadow:0 2px 12px var(--pink-glow);
}
.gift-scene.opened~.gift-msg,
.gift-msg.show{display:block;}
.gift-msg.show{opacity:1;transform:translateY(0) scale(1);}

/* bouton reset */
.gift-reset{
  display:none;margin-top:6px;
  background:none;border:1.5px solid var(--pink);
  color:var(--pink);border-radius:30px;
  padding:5px 16px;font-size:13px;font-weight:600;
  cursor:pointer;transition:all .25s;
}
.gift-reset:hover{background:var(--pink-light);}
.gift-reset.show{display:inline-block;}

/* ==========================================
   ANIMATION MODES
   ========================================== */

/* --- FADE (default) --- */
body.mode-fade .slide{opacity:0;transform:translateY(18px);transition:opacity .55s ease,transform .55s ease;display:block!important;pointer-events:none;}
body.mode-fade .slide.active{opacity:1;transform:translateY(0);pointer-events:auto;}

/* --- LIVRE --- */
body.mode-livre .slides-wrap{perspective:1200px;}
body.mode-livre .slide{
  display:block!important;pointer-events:none;
  backface-visibility:hidden;
  transform-origin:left center;
  transform:rotateY(-90deg) scale(.9);
  opacity:0;
  transition:transform .7s cubic-bezier(.4,0,.2,1),opacity .5s ease;
}
body.mode-livre .slide.active{
  transform:rotateY(0deg) scale(1);
  opacity:1;pointer-events:auto;
}
body.mode-livre .slide.exit-left{
  transform:rotateY(90deg) scale(.9);
  opacity:0;
}

/* --- SCROLLING --- */
body.mode-scrolling .slides-wrap{
  overflow-y:auto;max-height:65vh;
  padding-right:6px;
}
body.mode-scrolling .slide{
  display:block!important;position:relative!important;inset:auto!important;
  opacity:1!important;transform:none!important;pointer-events:auto!important;
  padding:20px 0;border-bottom:1px solid var(--border);
}
body.mode-scrolling .slide:last-child{border-bottom:none;}
body.mode-scrolling .nav{display:none!important;}

/* --- LETTRE --- */
body.mode-lettre .card{animation:openLetter 1s ease forwards;}
@keyframes openLetter{
  from{transform:scale(.72) rotate(-6deg);opacity:0}
  to{transform:scale(1) rotate(0deg);opacity:1}
}
body.mode-lettre .slide{opacity:0;transform:translateY(14px);transition:opacity .5s,transform .5s;display:block!important;pointer-events:none;}
body.mode-lettre .slide.active{opacity:1;transform:none;pointer-events:auto;}

/* --- TIMELINE --- */
body.mode-timeline .slides-wrap{
  display:flex;gap:0;overflow-x:auto;
  scroll-snap-type:x mandatory;
  padding-bottom:8px;
  -ms-overflow-style:none;scrollbar-width:none;
}
body.mode-timeline .slides-wrap::-webkit-scrollbar{display:none;}
body.mode-timeline .slide{
  display:flex!important;flex-direction:column;
  position:relative!important;inset:auto!important;
  min-width:88%;flex-shrink:0;
  scroll-snap-align:start;
  opacity:1!important;transform:none!important;pointer-events:auto!important;
  border-left:4px solid var(--pink);
  padding:0 0 10px 22px;
  margin-right:28px;
}
body.mode-timeline .slide::before{
  content:'●';position:absolute;left:-12px;top:2px;
  font-size:20px;color:var(--pink);line-height:1;
}
body.mode-timeline .nav{display:none!important;}

/* --- BULLES --- */
body.mode-bulles .slide{
  display:block!important;pointer-events:none;
  opacity:0;transform:translateY(22px) scale(.97);
  transition:opacity .5s,transform .5s;
}
body.mode-bulles .slide.active{
  opacity:1;transform:translateY(0) scale(1);pointer-events:auto;
  background:var(--pink-light);
  border-radius:32px 32px 32px 6px;
  padding:28px 28px 20px;
  box-shadow:0 10px 36px var(--pink-glow);
  border:1px solid var(--border);
}

/* --- KARAOKE --- */
body.mode-karaoke .slide-content{font-size:19px;letter-spacing:.5px;line-height:2;}
body.mode-karaoke .slide{opacity:0;transform:scale(.96);transition:opacity .6s,transform .6s;display:block!important;pointer-events:none;}
body.mode-karaoke .slide.active{opacity:1;transform:scale(1);pointer-events:auto;}

/* --- FEU --- */
body.mode-feu .slide{
  opacity:0;
  transition:opacity .6s;
  display:block!important;pointer-events:none;
}
body.mode-feu .slide.active{opacity:1;pointer-events:auto;}
body.mode-feu .card{
  background:radial-gradient(ellipse at center,rgba(255,107,107,.1) 0%,var(--card) 65%);
}

/* --- PUZZLE --- */
body.mode-puzzle .slide-content{font-size:16px;line-height:2.2;}
body.mode-puzzle .word-chip{
  display:inline-block;
  background:var(--pink-light);
  border:1px solid var(--border);
  padding:3px 11px;border-radius:8px;
  margin:3px;cursor:default;
  transition:transform .2s,background .2s;
}
body.mode-puzzle .word-chip:hover{transform:scale(1.1) rotate(-2deg);background:rgba(255,107,107,.28);}
body.mode-puzzle .slide{opacity:0;transform:translateY(16px);transition:opacity .5s,transform .5s;display:block!important;pointer-events:none;}
body.mode-puzzle .slide.active{opacity:1;transform:none;pointer-events:auto;}

/* --- HOLOGRAMME --- */
body.mode-hologramme{
  background:linear-gradient(135deg,#08081c 0%,#141430 50%,#0e2a4a 100%);
}
body.mode-hologramme .card{
  background:rgba(0,18,36,.55);
  border:1px solid rgba(0,220,255,.18);
  box-shadow:0 0 60px rgba(0,200,255,.1),0 24px 70px rgba(0,0,0,.6);
}
body.mode-hologramme .slide-content{color:#7fdbff;text-shadow:0 0 24px rgba(0,200,255,.25);}
body.mode-hologramme .nav-btn{background:rgba(0,200,255,.2);color:#7fdbff;box-shadow:0 4px 16px rgba(0,200,255,.3);}
body.mode-hologramme .nav-btn:hover:not(:disabled){background:rgba(0,200,255,.35);}
body.mode-hologramme .page-info{color:#5bc8e8;}
body.mode-hologramme .cursor{background:#7fdbff;}
body.mode-hologramme .slide{opacity:0;transform:translateY(10px);transition:opacity .55s,transform .55s;display:block!important;pointer-events:none;}
body.mode-hologramme .slide.active{opacity:1;transform:none;pointer-events:auto;}
body.mode-hologramme .controls select,
body.mode-hologramme .ctrl-btn{background:rgba(0,18,36,.8);color:#7fdbff;border-color:rgba(0,220,255,.4);}

/* ===== BACKGROUNDS ===== */
#confetti-c,#balloon-c,#stars-c{
  position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:1;
}
.confetti{position:absolute;top:-20px;border-radius:2px;animation:cfFall linear forwards;}
@keyframes cfFall{to{transform:translateY(110vh) rotate(700deg) scale(.4);opacity:0}}
.balloon{position:absolute;bottom:-130px;font-size:42px;animation:blFloat linear infinite;user-select:none;}
@keyframes blFloat{to{transform:translateY(-120vh) rotate(18deg) scale(.55);opacity:.15}}
.star{position:absolute;font-size:13px;animation:stTwinkle ease-in-out infinite alternate;user-select:none;opacity:.5;}
@keyframes stTwinkle{from{opacity:.15;transform:scale(.8)}to{opacity:1;transform:scale(1.25)}}

/* ===== SCROLLBAR ===== */
.slides-wrap::-webkit-scrollbar{width:4px;}
.slides-wrap::-webkit-scrollbar-thumb{background:var(--pink);border-radius:4px;}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  .card{padding:26px 22px 24px;min-height:420px;border-radius:18px;}
  .slide-content{font-size:14.5px;line-height:1.75;}
  .controls{top:10px;right:10px;}
  .controls select{max-width:170px;font-size:11.5px;padding:6px 11px;}
  .ctrl-btn{font-size:11.5px;padding:6px 11px;}
}
@media(max-width:480px){
  .card{padding:18px 14px 20px;min-height:380px;}
  .slide-content{font-size:13px;}
  .nav{flex-direction:column;align-items:center;}
  .page-info{order:-1;}
}
</style>
</head>

<script>
(function(){
'use strict';

/* ===== STATE ===== */
const slides   = [...document.querySelectorAll('.slide')];
const total    = slides.length;
let current    = 0;
let twTimer    = null;
let currentMode= 'fade';

/* ===== ELEMENTS ===== */
const prevBtn    = document.getElementById('prevBtn');
const nextBtn    = document.getElementById('nextBtn');
const pageInfo   = document.getElementById('pageInfo');
const themeBtn   = document.getElementById('themeBtn');
const giftScene  = document.getElementById('giftScene');
const giftMsg    = document.getElementById('giftMsg');
const giftReset  = document.getElementById('giftReset');
const modeSelect = document.getElementById('modeSelect');
const navBar     = document.getElementById('navBar');
const bgMusic    = document.getElementById('bgMusic');

/* ===== MUSIC ===== */
function startMusic(){
  bgMusic.volume=.28;
  bgMusic.play().catch(()=>{});
  document.removeEventListener('click',startMusic);
}
document.addEventListener('click',startMusic);

/* ===== THEME ===== */
themeBtn.addEventListener('click',()=>{
  document.body.classList.toggle('dark');
  themeBtn.textContent=document.body.classList.contains('dark')?'☀️ Thème':'🌙 Thème';
});

/* ===== GIFT ===== */
giftScene.addEventListener('click',()=>{
  if(giftScene.classList.contains('opened'))return;
  giftScene.classList.add('opened');
  setTimeout(()=>{giftMsg.classList.add('show');giftReset.classList.add('show');},350);
  // mini confetti burst
  for(let i=0;i<18;i++)setTimeout(spawnConfetti,i*60);
});
giftReset.addEventListener('click',()=>{
  giftScene.classList.remove('opened');
  giftMsg.classList.remove('show');
  giftReset.classList.remove('show');
});

/* ===== TYPEWRITER ===== */
function stopTW(){
  if(twTimer){clearTimeout(twTimer);twTimer=null;}
}

function runTW(el,text,i){
  if(i===0){el.innerHTML='';}
  if(i<text.length){
    let ch=text[i];
    el.innerHTML+=(ch==='\n')?'<br>':ch;
    twTimer=setTimeout(()=>runTW(el,text,i+1),22+Math.random()*28);
  }else{
    const c=document.createElement('span');
    c.className='cursor';
    el.appendChild(c);
    twTimer=null;
  }
}

function startTW(slide){
  stopTW();
  const el=slide.querySelector('.typewriter');
  if(!el)return;
  const text=el.getAttribute('data-text')||'';
  el.innerHTML='';
  runTW(el,text,0);
}

/* ===== PUZZLE MODE: wrap words ===== */
function applyPuzzle(slide){
  const el=slide.querySelector('.typewriter');
  if(!el||el.dataset.puzzled==='1')return;
  const raw=el.getAttribute('data-text')||'';
  // wrap each word in a span, preserve linebreaks
  const lines=raw.split('\n');
  el.innerHTML=lines.map(line=>{
    const words=line.trim()===''?['']:line.split(' ');
    return words.map(w=>w?`<span class="word-chip">${w}</span>`:' ').join(' ');
  }).join('<br>');
  el.dataset.puzzled='1';
}

function resetPuzzle(slide){
  const el=slide.querySelector('.typewriter');
  if(el)delete el.dataset.puzzled;
}

/* ===== SCROLLING/TIMELINE: fill all slides ===== */
function fillAllSlides(){
  slides.forEach(s=>{
    const el=s.querySelector('.typewriter');
    if(!el||el.dataset.filled==='1')return;
    const text=el.getAttribute('data-text')||'';
    if(currentMode==='puzzle'){
      applyPuzzle(s);
    }else{
      el.innerHTML=text.replace(/\n/g,'<br>');
    }
    el.dataset.filled='1';
  });
}

function resetFilled(){
  slides.forEach(s=>{
    const el=s.querySelector('.typewriter');
    if(el){delete el.dataset.filled;el.innerHTML='';}
    resetPuzzle(s);
  });
}

/* ===== NAVIGATION UTILS ===== */
const hideShowModes=['scrolling','timeline'];

function updateNav(){
  const hide=hideShowModes.includes(currentMode);
  navBar.style.display=hide?'none':'flex';
  prevBtn.disabled=current===0;
  nextBtn.disabled=current===total-1;
  pageInfo.textContent=(current+1)+' / '+total;
}

/* ===== GO TO SLIDE ===== */
function goTo(idx){
  if(idx<0||idx>=total||idx===current)return;

  if(currentMode==='livre'){
    slides[current].classList.remove('active');
    slides[current].classList.add('exit-left');
    setTimeout(()=>slides[current].classList.remove('exit-left'),700);
  }else{
    slides[current].classList.remove('active');
  }

  current=idx;
  slides[current].classList.add('active');

  if(!hideShowModes.includes(currentMode)){
    startTW(slides[current]);
  }

  updateNav();
}

/* ===== SET MODE ===== */
function setMode(mode){
  // remove old mode class
  document.body.classList.remove('mode-'+currentMode);

  // reset all slides state
  slides.forEach(s=>s.classList.remove('active','exit-left'));
  resetFilled();

  currentMode=mode;
  document.body.classList.add('mode-'+mode);

  if(hideShowModes.includes(mode)){
    // show all slides
    slides.forEach(s=>s.classList.add('active'));
    fillAllSlides();
  }else{
    slides[current].classList.add('active');
    if(mode==='puzzle'){
      applyPuzzle(slides[current]);
    }else{
      startTW(slides[current]);
    }
  }

  updateNav();

  // lettre: re-trigger card animation
  if(mode==='lettre'){
    const c=document.getElementById('mainCard');
    c.style.animation='none';
    void c.offsetWidth;
    c.style.animation='';
  }
}

/* ===== INIT ===== */
function init(){
  document.body.classList.add('mode-fade');
  slides[0].classList.add('active');
  startTW(slides[0]);
  updateNav();
}

/* ===== EVENTS ===== */
prevBtn.addEventListener('click',()=>goTo(current-1));
nextBtn.addEventListener('click',()=>goTo(current+1));

document.addEventListener('keydown',e=>{
  if(hideShowModes.includes(currentMode))return;
  if(e.key==='ArrowRight'||e.key==='ArrowDown'){e.preventDefault();goTo(current+1);}
  else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();goTo(current-1);}
});

modeSelect.addEventListener('change',function(){
  const val=this.value;
  if(val==='────────────')return;
  setMode(val);
});

/* ===== CONFETTI ===== */
const ccont=document.getElementById('confetti-c');
const COLORS=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff6bd6','#ff9f43'];
function spawnConfetti(){
  for(let i=0;i<5;i++){
    const d=document.createElement('div');
    d.className='confetti';
    d.style.cssText=`left:${Math.random()*100}%;background:${COLORS[Math.random()*COLORS.length|0]};width:${7+Math.random()*9}px;height:${7+Math.random()*9}px;border-radius:${Math.random()>.5?'50%':'3px'};animation-duration:${3+Math.random()*4}s;animation-delay:${Math.random()*1.5}s;`;
    ccont.appendChild(d);
    setTimeout(()=>d.remove(),7500);
  }
}
setInterval(spawnConfetti,900);
for(let i=0;i<12;i++)setTimeout(spawnConfetti,i*120);

/* ===== BALLOONS ===== */
const bcont=document.getElementById('balloon-c');
function spawnBalloon(){
  const b=document.createElement('div');
  b.className='balloon';
  b.textContent='🎈';
  b.style.cssText=`left:${Math.random()*100}%;font-size:${34+Math.random()*28}px;animation-duration:${13+Math.random()*14}s;animation-delay:${Math.random()*4}s;`;
  bcont.appendChild(b);
  setTimeout(()=>b.remove(),28000);
}
for(let i=0;i<5;i++)setTimeout(spawnBalloon,i*1100);
setInterval(spawnBalloon,3200);

/* ===== STARS ===== */
const scont=document.getElementById('stars-c');
const STARS=['⭐','✨','🌟','💫'];
(function createStars(){
  for(let i=0;i<12;i++){
    const s=document.createElement('div');
    s.className='star';
    s.textContent=STARS[Math.random()*STARS.length|0];
    s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;font-size:${9+Math.random()*18}px;animation-delay:${Math.random()*3}s;animation-duration:${1.5+Math.random()*2}s;`;
    scont.appendChild(s);
  }
})();

init();
})();
</script>
